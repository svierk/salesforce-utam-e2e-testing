<template>
<lightning-card title="Secure Portal - Admin Email" icon-name="utility:shield">
<div class="slds-p-around_medium">
<template if:true={showLogin}>
<lightning-input label="Username" onchange={handleInput} name="user"></lightning-input>
<lightning-input label="Password" type="password" onchange={handleInput} name="pass"></lightning-input>
<lightning-button label="Continue" variant="brand" onclick={handleStepOne} stretch class="slds-m-top_medium"></lightning-button>
</template>
 
            <template if:true={showRegistration}>
<div class="slds-box slds-theme_success slds-theme_alert-texture slds-m-bottom_small">
<p>Registering New Security Key...</p>
</div>
<div class="slds-align_absolute-center slds-m-vertical_medium">
<img src={qrCodeUrl} alt="Scan QR Code" style="border:4px solid white;"/>
</div>
<lightning-input label="Enter 6-Digit App Code" onchange={handleInput} name="otp"></lightning-input>
<lightning-button label="Complete Setup" variant="success" onclick={handleStepTwo} stretch class="slds-m-top_small"></lightning-button>
</template>
 
            <template if:true={showVerification}>
<p class="slds-m-bottom_small">Enter your Authenticator code to log in:</p>
<lightning-input label="6-Digit Code" onchange={handleInput} name="otp"></lightning-input>
<lightning-button label="Verify & Login" variant="brand" onclick={handleStepTwo} stretch class="slds-m-top_small"></lightning-button>
</template>
 
        </div>
</lightning-card>
</template>
