<template>

    <lightning-card title="Credential Vault" icon-name="utility:lock">

        <div class="slds-p-around_medium">

            <!-- NEW BUTTON -->

            <div class="slds-m-bottom_medium slds-text-align_right">

                <lightning-button
                    label="New"
                    variant="brand"
                    onclick={openModal}>
                </lightning-button>

            </div>


            <!-- DATA TABLE -->

            <lightning-datatable
                key-field="credentialId"
                data={credentialData}
                columns={columns}
                onrowaction={handleRowAction}
                >
            </lightning-datatable>


        </div>

    </lightning-card>


    <!-- MODAL -->

    <template if:true={showModal}>

        <section
            role="dialog"
            tabindex="-1"
            class="slds-modal slds-fade-in-open">

            <div class="slds-modal__container">

                <header class="slds-modal__header">

                    <h2 class="slds-text-heading_medium">
                        {modalTitle}
                    </h2>

                </header>


                <div class="slds-modal__content slds-p-around_medium">

                    <lightning-input
                        label="Project Name"
                        value={projectName}
                        onchange={handleInput}
                        name="projectName">
                    </lightning-input>


                    <lightning-combobox
                        label="Org Type"
                        name="orgType"
                        value={orgType}
                        options={orgTypeOptions}
                        onchange={handleInput}>
                    </lightning-combobox>


                    <lightning-input
                        label="Org Username"
                        value={orgUsername}
                        onchange={handleInput}
                        name="orgUsername">
                    </lightning-input>


                    <lightning-input
                        label="Org Password"
                        type="password"
                        value={orgPassword}
                        onchange={handleInput}
                        name="orgPassword">
                    </lightning-input>


                    <lightning-dual-listbox
                        label="Share With Users"
                        source-label="Available"
                        selected-label="Selected"
                        options={portalUsers}
                        value={selectedUsers}
                        onchange={handleUserSelection}>
                    </lightning-dual-listbox>

                </div>


                <footer class="slds-modal__footer">

                    <lightning-button
                        label="Cancel"
                        onclick={closeModal}>
                    </lightning-button>


                    <lightning-button
                        label="Save"
                        variant="brand"
                        onclick={saveCredential}>
                    </lightning-button>

                </footer>

            </div>

        </section>

        <div class="slds-backdrop slds-backdrop_open"></div>

    </template>

</template>
